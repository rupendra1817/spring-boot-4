services:

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka42
    hostname: kafka42

    ports:
      - "9092:9092"
      - "29092:29092"

    networks:
      - kafka-network

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,DOCKER://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,DOCKER://kafka42:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka42:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s


  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui

    ports:
      - "8082:8080"

    depends_on:
      kafka:
        condition: service_healthy

    restart: unless-stopped

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka42:29092

    networks:
      - kafka-network

networks:
  kafka-network:
    name: kafka-network
    driver: bridge
